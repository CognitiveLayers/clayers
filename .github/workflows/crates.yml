name: Publish crates to crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish clayers-xml
        run: cargo publish -p clayers-xml --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "Already published or failed"
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish clayers-spec
        run: cargo publish -p clayers-spec --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "Already published or failed"
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish clayers-repo
        run: cargo publish -p clayers-repo --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "Already published or failed"
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish clayers
        run: cargo publish -p clayers --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "Already published or failed"
